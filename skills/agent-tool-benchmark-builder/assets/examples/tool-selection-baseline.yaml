benchmark_id: coding-agent-tool-choice-baseline
focus: tool-selection-and-arg-correctness
tasks:
  - task_id: t001
    user_request: "Find where the app defines the login redirect."
    context: "A local repository is available. The agent may search code, run tests, or edit files."
    available_tools:
      - name: search_code
        purpose: "Search repository files by pattern."
        required_args:
          - pattern
      - name: run_tests
        purpose: "Execute project tests."
        required_args:
          - target
      - name: edit_file
        purpose: "Apply file edits."
        required_args:
          - path
          - patch
    expected:
      primary_tool: search_code
      required_args:
        pattern: "login redirect"
      allowed_alternatives:
        - tool: search_code
          required_args:
            pattern: "redirect"
      forbidden_tools:
        - run_tests
        - edit_file
      preconditions: []
    scoring:
      tool_choice_weight: 0.5
      arg_correctness_weight: 0.3
      format_weight: 0.1
      overcall_penalty_weight: 0.1
    evidence:
      rationale: "This request is a discovery task. The correct first move is code search, not execution or mutation."
      oracle_signals:
        - "first_tool=search_code"
        - "required_arg_contains=redirect"
    failure_modes:
      - wrong-tool
      - missing-required-arg
      - speculative-call
      - overcalling
