interface:
  display_name: "Guarded Project I18n Support"
  short_description: "Plan safe project-level i18n support"
  default_prompt: "Use $guarded-project-i18n-support to inspect a repository and plan the safest way to add or extend i18n support."
chains:
  upstream:
    - project-architecture-design-analyzer
  downstream:
    - guarded-component-i18n-fix
  common_sequences:
    - [guarded-project-i18n-support, guarded-component-i18n-fix, component-unit-test-completer]
